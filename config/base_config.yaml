# 联邦交易系统 - 基础配置
# 每台机器复制此文件，修改本地部分

# ============ 网络配置（三台统一） ============
master:
  ip: "192.168.0.143"
  port: 22
  user: "heng"
  lora_sync_path: "/home/heng/fed-trading/loras"

# ============ 本机配置（每台修改） ============
node:
  id: "lenovo"              # ← .18 固定为 acer
  ip: "192.168.0.143"      # ← .18 的固定IP
  role: "trainer"      # acer 是聚合主机

# ============ 模型配置（统一） ============
model:
  base: "Qwen/Qwen2.5-0.5B-Instruct"
  lora_r: 8
  lora_alpha: 16
  target_modules: ["q_proj", "v_proj"]

# ============ 训练配置（统一） ============
train:
  batch_size: 1
  gradient_accumulation_steps: 4
  max_steps: 100
  learning_rate: 2e-4
  output_dir: "./loras/{node_id}"

# ============ 数据配置（按节点分工） ============
data:
  source: "tech"          # acer 专注风控数据
  db_url: "postgresql://postgres:newpassword123@192.168.0.18:5432/quantforce"
